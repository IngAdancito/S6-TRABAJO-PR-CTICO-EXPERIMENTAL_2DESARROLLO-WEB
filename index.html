<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro Validado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="form-section">
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Por favor, completa los siguientes datos.</p>
            
            <form id="registrationForm" novalidate>
                <div class="form-group">
                    <label for="username">Nombre completo *</label>
                    <input type="text" id="username" name="username" placeholder="Ej. Juan Pérez">
                    <span class="error-message" id="usernameError" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico *</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">
                    <span class="error-message" id="emailError" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres">
                    <span class="error-message" id="passwordError" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="age">Edad *</label>
                    <input type="number" id="age" name="age" placeholder="Ej. 25" min="1" max="120">
                    <span class="error-message" id="ageError" aria-live="polite"></span>
                </div>

                <button type="submit" id="submitBtn">Registrarse</button>
                
                <div id="formStatus" class="form-status" aria-live="assertive"></div>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
